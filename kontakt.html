<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | [Firmenname]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
        }

        .bg-primary {
            background-color: var(--primary);
        }

        .text-primary {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <!-- Header wie oben -->

    <main class="py-20 px-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12">
        <div>
            <h1 class="text-4xl font-extrabold uppercase mb-4">Kontaktieren Sie uns</h1>
            <p class="text-gray-600 mb-8 font-medium">Vereinbaren Sie noch heute Ihren Termin. Wir freuen uns auf Ihre
                Anfrage!</p>

            <div class="space-y-6 mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-primary text-white flex items-center justify-center rounded-full"><i
                            class="fas fa-phone"></i></div>
                    <div>
                        <h4 class="font-bold">Telefon</h4>
                        <p>[Telefonnummer]</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-primary text-white flex items-center justify-center rounded-full"><i
                            class="fas fa-envelope"></i></div>
                    <div>
                        <h4 class="font-bold">E-Mail</h4>
                        <p>[E-Mail Adresse]</p>
                    </div>
                </div>
            </div>

            <div class="bg-gray-100 p-6 rounded-lg text-sm text-gray-500 italic">
                [Hier Google Maps Embed einfügen]
            </div>
        </div>

        <form class="bg-white border p-8 rounded-xl shadow-lg space-y-4">
            <h3 class="text-2xl font-bold mb-4">Online-Terminanfrage</h3>
            <input type="text" placeholder="Ihr Name"
                class="w-full p-3 border rounded focus:border-primary outline-none" required>
            <input type="email" placeholder="Ihre E-Mail"
                class="w-full p-3 border rounded focus:border-primary outline-none" required>
            <select class="w-full p-3 border rounded focus:border-primary outline-none bg-white">
                <option disabled selected>Grund der Anfrage</option>
                <option>Inspektion / Ölwechsel</option>
                <option>Reparatur</option>
                <option>Reifenservice</option>
                <option>Sonstiges</option>
            </select>
            <textarea placeholder="Ihre Nachricht / Wunschtermin"
                class="w-full p-3 border rounded h-32 focus:border-primary outline-none"></textarea>
            <button type="submit"
                class="bg-primary text-white w-full py-4 rounded font-bold uppercase hover:bg-opacity-90 transition">Jetzt
                Anfrage senden</button>
        </form>
    </main>
</body>

</html>
